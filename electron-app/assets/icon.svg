<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGradient)" rx="80"/>
  
  <!-- Circuit lines background -->
  <path d="M 50 100 L 150 100 L 150 50" stroke="#00ffff" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 462 100 L 362 100 L 362 50" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 50 412 L 150 412 L 150 462" stroke="#ffff00" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 462 412 L 362 412 L 362 462" stroke="#00ffff" stroke-width="2" fill="none" opacity="0.3"/>
  
  <!-- Circuit nodes -->
  <circle cx="150" cy="50" r="5" fill="#00ffff" filter="url(#glow)"/>
  <circle cx="362" cy="50" r="5" fill="#ff00ff" filter="url(#glow)"/>
  <circle cx="150" cy="462" r="5" fill="#ffff00" filter="url(#glow)"/>
  <circle cx="362" cy="462" r="5" fill="#00ffff" filter="url(#glow)"/>
  
  <!-- Main mailbox icon with cyberpunk style -->
  <g transform="translate(256, 256)">
    <!-- Mailbox body -->
    <rect x="-100" y="-60" width="200" height="140" rx="15" 
          fill="none" stroke="url(#cyberGradient)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Mailbox lid -->
    <path d="M -100 -60 Q 0 -120, 100 -60" 
          fill="none" stroke="url(#cyberGradient)" stroke-width="6" filter="url(#glow)"/>
    
    <!-- Digital display lines -->
    <line x1="-70" y1="-20" x2="70" y2="-20" stroke="#00ffff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
    <line x1="-70" y1="0" x2="50" y2="0" stroke="#ff00ff" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
    <line x1="-70" y1="20" x2="60" y2="20" stroke="#ffff00" stroke-width="3" opacity="0.8" filter="url(#glow)"/>
    
    <!-- Cyberpunk envelope inside -->
    <g transform="translate(0, 10)">
      <path d="M -40 -10 L 0 20 L 40 -10" 
            fill="none" stroke="#00ffff" stroke-width="4" filter="url(#glow)"/>
      <path d="M -40 -10 L 40 -10 L 40 30 L -40 30 Z" 
            fill="none" stroke="url(#cyberGradient)" stroke-width="4" filter="url(#glow)"/>
    </g>
    
    <!-- Mailbox flag (cyberpunk style) -->
    <g transform="translate(100, -40)">
      <rect x="0" y="0" width="40" height="25" rx="3"
            fill="none" stroke="#ff00ff" stroke-width="4" filter="url(#glow)"/>
      <line x1="5" y1="8" x2="35" y2="8" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
      <line x1="5" y1="17" x2="25" y2="17" stroke="#ff00ff" stroke-width="2" filter="url(#glow)"/>
    </g>
    
    <!-- Glowing particles -->
    <circle cx="-120" cy="-80" r="3" fill="#00ffff" opacity="0.8" filter="url(#glow)"/>
    <circle cx="130" cy="-90" r="2" fill="#ff00ff" opacity="0.8" filter="url(#glow)"/>
    <circle cx="-110" cy="90" r="2.5" fill="#ffff00" opacity="0.8" filter="url(#glow)"/>
    <circle cx="120" cy="85" r="3" fill="#00ffff" opacity="0.8" filter="url(#glow)"/>
  </g>
  
  <!-- Corner accents -->
  <path d="M 40 40 L 80 40 L 80 80" stroke="url(#cyberGradient)" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 472 40 L 432 40 L 432 80" stroke="url(#cyberGradient)" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 40 472 L 80 472 L 80 432" stroke="url(#cyberGradient)" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M 472 472 L 432 472 L 432 432" stroke="url(#cyberGradient)" stroke-width="4" fill="none" opacity="0.6"/>
  
  <!-- Bottom text effect -->
  <text x="256" y="480" font-family="Arial, sans-serif" font-size="24" font-weight="bold" 
        fill="url(#cyberGradient)" text-anchor="middle" opacity="0.8">MAILBOX</text>
</svg>
